<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Flowboard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d24"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#5DB97A"/>
    </linearGradient>
    <radialGradient id="ref" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#7DDC9C"/>
      <stop offset="100%" stop-color="#1d4d2e"/>
    </radialGradient>
    <radialGradient id="img" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#A78BFF"/>
      <stop offset="100%" stop-color="#5532D5"/>
    </radialGradient>
    <radialGradient id="vid" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#FFB070"/>
      <stop offset="100%" stop-color="#C75A1A"/>
    </radialGradient>
  </defs>

  <!-- card background -->
  <rect x="8" y="8" width="224" height="224" rx="48" ry="48" fill="url(#bg)" stroke="#2a2e38" stroke-width="2"/>

  <!-- edges (curved) -->
  <path d="M 70 80 Q 110 80 130 120" fill="none" stroke="url(#edge)" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M 70 160 Q 110 160 130 120" fill="none" stroke="url(#edge)" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M 130 120 Q 165 120 180 120" fill="none" stroke="url(#edge)" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>

  <!-- ref nodes (left column) -->
  <circle cx="70" cy="80"  r="22" fill="url(#ref)" stroke="#5DB97A" stroke-width="2"/>
  <circle cx="70" cy="160" r="22" fill="url(#ref)" stroke="#5DB97A" stroke-width="2"/>

  <!-- composition node (centre) -->
  <circle cx="130" cy="120" r="26" fill="url(#img)" stroke="#7C5CFF" stroke-width="2.5"/>

  <!-- video node (right) -->
  <circle cx="180" cy="120" r="22" fill="url(#vid)" stroke="#FF8B40" stroke-width="2"/>
  <!-- play triangle inside video node -->
  <polygon points="174,111 174,129 188,120" fill="#1a1d24"/>
</svg>
